# Starship configuration - Minimal style
# https://starship.rs/config/

# 全局配置
add_newline = false
format = """$cmd_duration$status$line_break$custom$directory$python$git_branch$git_commit$git_status$line_break$character"""
command_timeout = 5000  # 命令超时时间，单位为毫秒

[line_break]
disabled = false

# 系统运行时间
[custom.uptime]
# command = "uptime -p | sed 's/up //; s/ days\\?/d/g; s/ hours\\?/h/g; s/ minutes\\?/m/g; s/,//g; s/ //g'"
command = "only_uptime"
when = true
format = "[$output]($style) "
style = "dimmed white"

# 字符配置
[character]
success_symbol = "[\\$](bold green)"
error_symbol = "[\\$](bold red)"

# 目录配置
[directory]
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style) "
style = "bold blue"

# Git 分支配置
[git_branch]
symbol = ""
format = "[$branch]($style) "
style = "purple"

# Git 状态配置 - git status --short 格式
[git_status]
format = '([$all_status$ahead_behind]($style) )'
ahead = ">${count}"
behind = "<${count}"
diverged = "<>${ahead_count}<${behind_count}"
up_to_date = "✓"
untracked = "${count}?? "
stashed = "${count}S "
modified = "${count}M "
staged = "${count}A "
renamed = "${count}R "
deleted = "${count}D "
conflicted = "${count}U "
style = "yellow"

# 命令执行时间
[cmd_duration]
disabled = false
min_time = 2000  # 只显示超过 2 秒的命令
format = "[Took $duration]($style) "
style = "yellow"

[python]
format = '[(${version} )(\($virtualenv\) )]($style)'

[status]
format = '[$common_meaning$signal_name$maybe_int]($style) '
map_symbol = true
disabled = false

# 禁用其他模块
[time]
disabled = true

[username]
disabled = true

[hostname]
disabled = true

[nodejs]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[java]
disabled = true

[package]
disabled = true

[docker_context]
disabled = true

[terraform]
disabled = true

[kubernetes]
disabled = true

[battery]
disabled = true

[memory_usage]
disabled = true

[sudo]
disabled = true

[container]
disabled = true
